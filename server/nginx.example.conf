# Sample nginx vhost.  Adjust server_name, certificate paths, and
# proxy_pass port to match your deployment.  client_max_body_size must
# stay above whatever MAX_UPLOAD_BYTES app.py uses (default 16 MiB) or
# nginx will reject ROM uploads before they reach Flask.

server {
    listen 80;
    server_name your-cloud.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-cloud.example.com;

    ssl_certificate     /etc/letsencrypt/live/your-cloud.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-cloud.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32M;

    location / {
        proxy_pass http://127.0.0.1:5095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
    }
}
