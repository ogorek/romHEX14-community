name: Mirror to Gitee
on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITEE_SSH_KEY }}
      - name: Push to Gitee
        run: |
          git remote add gitee git@gitee.com:ctabuyo/romHEX14-community.git || true
          git push gitee --all --force
          git push gitee --tags --force
